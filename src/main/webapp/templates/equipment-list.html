<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="layout.html"
  lang="vi"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danh Sách Thiết Bị</title>
  </head>
  <body>
    <main layout:fragment="content" class="py-4">
      <h1 class="mb-6 text-2xl font-bold">⚙️ Danh Sách Thiết Bị Sẵn Có</h1>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <div th:if="${#lists.isEmpty(equipmentList)}" class="col-span-full">
          <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 text-blue-700">
            Chưa có thiết bị nào trong hệ thống.
          </div>
        </div>
        <div
          th:each="equipment : ${equipmentList}"
        >
          <div class="equipment-card bg-white rounded-lg border border-gray-200 overflow-hidden shadow-sm">
            <img
              th:src="${equipment.imageUrl}"
              class="equipment-image w-full"
              th:alt="${equipment.name}"
              alt="Equipment"
            />
            <div class="p-4 flex flex-col">
              <h5
                class="font-bold truncate mb-2"
                th:text="${equipment.name}"
              >
                Equipment Name
              </h5>
              <p
                class="text-gray-500 text-sm mb-3 flex-grow"
                th:text="${equipment.description}"
              >
                Description
              </p>
              <div class="mt-auto">
                <p class="mb-3">
                  <span
                    class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-green-100 text-green-800"
                    th:text="'Còn lại: ' + ${equipment.quantityAvailable} + ' cái'"
                  >
                    Quantity
                  </span>
                </p>
                <a
                  th:href="@{/borrow/equipment/{id}(id=${equipment.id})}"
                  class="block text-center bg-green-600 text-white px-4 py-2 rounded font-medium hover:bg-green-700 transition"
                >
                  📋 Đăng ký mượn
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="text-center mt-8">
        <a th:href="@{/}" class="inline-block border border-blue-600 text-blue-600 px-6 py-2 rounded font-medium hover:bg-blue-50 transition"
          >← Quay lại trang chủ</a
        >
      </div>
    </main>
  </body>
</html>
