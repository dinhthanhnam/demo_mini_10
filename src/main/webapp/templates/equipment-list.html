<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="layout.html"
  lang="vi"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danh Sách Thiết Bị</title>
  </head>
  <body>
    <main layout:fragment="content" class="py-4">
      <h1 class="mb-4 fw-bold">⚙️ Danh Sách Thiết Bị Sẵn Có</h1>

      <div class="row">
        <div th:if="${#lists.isEmpty(equipmentList)}" class="col-12">
          <div class="alert alert-info">
            Chưa có thiết bị nào trong hệ thống.
          </div>
        </div>
        <div
          th:each="equipment : ${equipmentList}"
          class="col-md-6 col-lg-4 mb-4"
        >
          <div class="card equipment-card h-100 shadow-sm">
            <img
              th:src="${equipment.imageUrl}"
              class="card-img-top equipment-image"
              th:alt="${equipment.name}"
              alt="Equipment"
            />
            <div class="card-body d-flex flex-column">
              <h5
                class="card-title fw-bold text-truncate"
                th:text="${equipment.name}"
              >
                Equipment Name
              </h5>
              <p
                class="card-text text-muted small"
                th:text="${equipment.description}"
              >
                Description
              </p>
              <div class="mt-auto">
                <p class="mb-3">
                  <span
                    class="badge bg-success"
                    th:text="'Còn lại: ' + ${equipment.quantityAvailable} + ' cái'"
                  >
                    Quantity
                  </span>
                </p>
                <a
                  th:href="@{/borrow/equipment/{id}(id=${equipment.id})}"
                  class="btn btn-borrow btn-sm w-100"
                >
                  📋 Đăng ký mượn
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="text-center mt-4">
        <a th:href="@{/}" class="btn btn-outline-primary"
          >← Quay lại trang chủ</a
        >
      </div>
    </main>
  </body>
</html>
