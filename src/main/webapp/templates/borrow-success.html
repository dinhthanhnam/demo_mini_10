<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout.html"
      lang="vi">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Thành Công</title>
</head>
<body>
    <main layout:fragment="content" class="py-4">
        <div class="row">
            <div class="col-lg-6 mx-auto">
                <div class="card shadow-lg border-success">
                    <div class="card-body text-center p-5">
                        <div style="font-size: 4rem; margin-bottom: 20px;">✓</div>
                        <h1 class="card-title fw-bold text-success mb-3">Đăng Ký Thành Công!</h1>
                        <p class="card-text text-muted mb-4">
                            Đơn đăng ký mượn/sử dụng của bạn đã được gửi thành công.
                        </p>
                        <div class="alert alert-light border-start border-4 border-success">
                            <p class="mb-1">
                                <strong>Trạng thái:</strong> <span class="badge bg-warning">Chờ xác nhận</span>
                            </p>
                            <p class="mb-0 small text-muted">
                                Quản lý Lab sẽ xem xét và liên hệ với bạn trong thời gian sớm nhất.
                            </p>
                        </div>

                        <div class="row mt-4">
                            <div class="col-6 mb-2">
                                <a th:href="@{/}" class="btn btn-primary btn-lg w-100">
                                    🏠 Trang Chủ
                                </a>
                            </div>
                            <div class="col-6 mb-2">
                                <a th:href="@{/equipment}" class="btn btn-outline-primary btn-lg w-100">
                                    ⚙️ Thiết Bị
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
