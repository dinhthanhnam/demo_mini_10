<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="layout.html"
  lang="vi"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danh Sách Phòng Lab</title>
  </head>
  <body>
    <main layout:fragment="content" class="py-4">
      <h1 class="mb-6 text-2xl font-bold">🏢 Danh Sách Phòng Lab</h1>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <div th:if="${#lists.isEmpty(labRoomList)}" class="col-span-full">
          <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 text-blue-700">
            Chưa có phòng Lab nào trong hệ thống.
          </div>
        </div>
        <div th:each="labRoom : ${labRoomList}">
          <div class="equipment-card bg-white rounded-lg border border-gray-200 overflow-hidden shadow-sm">
            <img
              th:src="${labRoom.imageUrl}"
              class="equipment-image w-full"
              th:alt="${labRoom.roomName}"
              alt="Lab Room"
            />
            <div class="p-4 flex flex-col">
              <h5
                class="font-bold truncate mb-2"
                th:text="${labRoom.roomName}"
              >
                Lab Room Name
              </h5>
              <p
                class="text-gray-500 text-sm mb-3 flex-grow"
                th:text="${labRoom.description}"
              >
                Description
              </p>
              <div class="mt-auto">
                <p class="mb-3 flex gap-2">
                  <span th:if="${labRoom.available}" class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-green-100 text-green-800">
                    ✓ Khả dụng
                  </span>
                  <span
                    th:unless="${labRoom.available}"
                    class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-red-100 text-red-800"
                  >
                    ✗ Không khả dụng
                  </span>
                  <span
                    class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-blue-100 text-blue-800"
                    th:text="'Sức chứa: ' + ${labRoom.capacity} + ' người'"
                  >
                    Capacity
                  </span>
                </p>
                <a
                  th:if="${labRoom.available}"
                  th:href="@{/borrow/lab-room/{id}(id=${labRoom.id})}"
                  class="block text-center bg-green-600 text-white px-4 py-2 rounded font-medium hover:bg-green-700 transition"
                >
                  📋 Đăng ký sử dụng
                </a>
                <button
                  th:unless="${labRoom.available}"
                  class="w-full bg-gray-400 text-white px-4 py-2 rounded font-medium cursor-not-allowed opacity-50"
                  disabled
                >
                  🔒 Không khả dụng
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="text-center mt-8">
        <a th:href="@{/}" class="inline-block border border-blue-600 text-blue-600 px-6 py-2 rounded font-medium hover:bg-blue-50 transition"
          >← Quay lại trang chủ</a
        >
      </div>
    </main>
  </body>
</html>
