<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="layout.html"
  lang="vi"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danh Sách Phòng Lab</title>
  </head>
  <body>
    <main layout:fragment="content" class="py-4">
      <h1 class="mb-4 fw-bold">🏢 Danh Sách Phòng Lab</h1>

      <div class="row">
        <div th:if="${#lists.isEmpty(labRoomList)}" class="col-12">
          <div class="alert alert-info">
            Chưa có phòng Lab nào trong hệ thống.
          </div>
        </div>
        <div th:each="labRoom : ${labRoomList}" class="col-md-6 col-lg-4 mb-4">
          <div class="card equipment-card h-100 shadow-sm">
            <img
              th:src="${labRoom.imageUrl}"
              class="card-img-top equipment-image"
              th:alt="${labRoom.roomName}"
              alt="Lab Room"
            />
            <div class="card-body d-flex flex-column">
              <h5
                class="card-title fw-bold text-truncate"
                th:text="${labRoom.roomName}"
              >
                Lab Room Name
              </h5>
              <p
                class="card-text text-muted small"
                th:text="${labRoom.description}"
              >
                Description
              </p>
              <div class="mt-auto">
                <p class="mb-3">
                  <span th:if="${labRoom.available}" class="badge bg-success">
                    ✓ Khả dụng
                  </span>
                  <span
                    th:unless="${labRoom.available}"
                    class="badge bg-danger"
                  >
                    ✗ Không khả dụng
                  </span>
                  <span
                    class="badge bg-info ms-2"
                    th:text="'Sức chứa: ' + ${labRoom.capacity} + ' người'"
                  >
                    Capacity
                  </span>
                </p>
                <a
                  th:if="${labRoom.available}"
                  th:href="@{/borrow/lab-room/{id}(id=${labRoom.id})}"
                  class="btn btn-borrow btn-sm w-100"
                >
                  📋 Đăng ký sử dụng
                </a>
                <button
                  th:unless="${labRoom.available}"
                  class="btn btn-secondary btn-sm w-100"
                  disabled
                >
                  🔒 Không khả dụng
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="text-center mt-4">
        <a th:href="@{/}" class="btn btn-outline-primary"
          >← Quay lại trang chủ</a
        >
      </div>
    </main>
  </body>
</html>
