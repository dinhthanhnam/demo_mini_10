<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  lang="vi"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title layout:title-pattern="$LAYOUT_TITLE - $CONTENT_TITLE">
      Hệ thống Quản lý Mượn/Trả Thiết bị IT & Phòng Lab
    </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        @apply font-sans;
      }
      
      .equipment-card {
        @apply transition-transform duration-300 ease-out;
      }
      
      .equipment-card:hover {
        @apply -translate-y-1;
      }
      
      .equipment-image {
        @apply h-48 object-cover bg-gray-100;
      }
      
      .error-message {
        @apply text-red-600 text-sm mt-1;
      }
      
      .form-error {
        @apply border-red-500 bg-red-50;
      }
      
      .admin-badge {
        @apply inline-block bg-red-600 text-white text-xs px-2 py-1 rounded ml-2;
      }
    </style>
  </head>
  <body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white border-b border-gray-200">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
          <div class="flex items-center">
            <a class="text-blue-600 font-bold text-lg" th:href="@{/}">📚 Lab Management</a>
          </div>
          <div class="flex items-center space-x-6">
            <a class="text-gray-700 hover:text-blue-600 transition" th:href="@{/}">Trang chủ</a>
            <a class="text-gray-700 hover:text-blue-600 transition" th:href="@{/equipment}">Thiết bị</a>
            <a class="text-gray-700 hover:text-blue-600 transition" th:href="@{/lab-rooms}">Phòng Lab</a>
            <a class="flex items-center hover:text-blue-600 transition" th:href="@{/admin/dashboard}">
              <span class="admin-badge">Admin</span>
            </a>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 my-4" layout:fragment="content">
      <p>Default content</p>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-50 border-t border-gray-200 mt-20 py-6">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-gray-500">
        <p>
          &copy; 2026 Hệ thống Quản lý Mượn/Trả Thiết bị IT & Phòng Lab. All
          rights reserved.
        </p>
      </div>
    </footer>
  </body>
</html>
